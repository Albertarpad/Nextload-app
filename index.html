<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextLoad - Regisztráció</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #0052FF; color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { background: white; color: #333; padding: 30px; border-radius: 15px; width: 300px; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; background: #00F5A0; border: none; border-radius: 5px; color: #0052FF; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#0052FF">NextLoad</h2>
        <input type="text" id="neved" placeholder="Teljes neved">
        <select id="auto">
            <option value="furgon">Furgon</option>
            <option value="kamion">Kamion</option>
        </select>
        <button onclick="elkuld()">Csatlakozás</button>
        <p id="visszajelzes" style="font-weight:bold; margin-top:10px;"></p>
    </div>

    <script>
        // FIGYELJ: Itt más neveket használok, hogy NE legyen ütközés!
        const SAJAT_URL = 'https://sqnwvposgbnhsfzdajib.supabase.co';
        const SAJAT_KULCS = 'IDE_MASOLD_AZ_ANON_KULCSOT'; // <--- IDE AZ ANON PUBLIC KULCS KELL!

        const kapcsolat = supabase.createClient(SAJAT_URL, SAJAT_KULCS);

        async function elkuld() {
            const nev = document.getElementById('neved').value;
            const jarmu = document.getElementById('auto').value;
            const statusz = document.getElementById('visszajelzes');

            if(!nev) { statusz.innerText = "Írd be a neved!"; return; }

            const { error } = await kapcsolat
                .from('carriers')
                .insert([{ full_name: nev, vehicle_type: jarmu }]);

            if (error) {
                statusz.innerText = "Hiba: " + error.message;
                statusz.style.color = "red";
            } else {
                statusz.innerText = "SIKER! Benne vagy a rendszerben!";
                statusz.style.color = "green";
                document.getElementById('neved').value = "";
            }
        }
    </script>
</body>
</html>
