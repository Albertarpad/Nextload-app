<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextLoad - Flotta & Chat</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #eee; z-index: 1; }
        
        .form-container {
            position: absolute; top: 10px; left: 10px; z-index: 2000;
            background: white; padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 240px;
        }
        
        #trip-info { 
            background: #2c3e50; color: white; padding: 8px; 
            border-radius: 6px; margin-bottom: 8px; font-size: 13px; 
            text-align: center; display: none; font-weight: bold;
        }

        input, select, button { 
            width: 100%; padding: 10px; margin: 4px 0; 
            border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box;
        }
        
        .btn-on { background-color: #f39c12; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-off { background-color: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        #chat-wrapper {
            position: absolute; bottom: 10px; right: 10px; z-index: 3000;
            display: flex; flex-direction: column; align-items: flex-end;
        }

        #chat-toggle {
            background: #27ae60; color: white; border: none; padding: 12px 20px;
            border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #chat-container {
            width: 300px; max-width: 90vw; height: 350px; background: white;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: none; flex-direction: column; overflow: hidden;
            border: 1px solid #ddd; margin-bottom: 10px;
        }

        #chat-header { background: #2c3e50; color: white; padding: 10px; font-weight: bold; text-align: center; cursor: pointer; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; background: #fdfdfd; display: flex; flex-direction: column; }
        #chat-input-area { display: flex; padding: 8px; background: white; border-top: 1px solid #eee; }
        #chat-input-area input { flex: 1; margin: 0 5px 0 0; padding: 8px; }
        #chat-input-area button { width: 60px; padding: 8px; background: #27ae60; color: white; border: none; font-size: 12px; }

        .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 8px; background: #f0f0ff; border-left: 4px solid #27ae60; word-break: break-word; }
        .msg b { color: #2c3e50; font-size: 11px; display: block; margin-bottom: 2px; }

        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div class="form-container">
    <div id="trip-info">Számítás...</div>
    <h3 style="margin:0 0 8px 0; text-align:center; font-size: 18px;">NextLoad</h3>
    <input type="text" id="neved" placeholder="Sofőr neve">
    <select id="auto">
        <option value="🚛">Kamion 🚛</option>
        <option value="🚚">Furgon 🚚</option>
        <option value="🚗">Puttonyos 🚗</option>
    </select>
    <input type="text" id="uticel" placeholder="Úticél">
    <button class="btn-on" onclick="inditas()">ONLINE LESZEK</button>
    <button class="btn-off" onclick="stop()" style="margin-top:4px;">MŰSZAK VÉGE</button>
</div>

<div id="chat-wrapper">
    <div id="chat-container">
        <div id="chat-header" onclick="toggleChat()">CB Rádió (Bezárás)</div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-msg" placeholder="Üzenet..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()">KÜLD</button>
        </div>
    </div>
    <button id="chat-toggle" onclick="toggleChat()">💬 Chat / CB</button>
</div>

<div id="map"></div>

<script>
    const SB_URL = "https://sqnwvposgbnhsfzdajib.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    var map = L.map('map', { zoomControl: false }).setView([47.16, 19.50], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    let watchId = null;
    let routingControl = null;
    let markers = {};

    function toggleChat() {
        const chat = document.getElementById('chat-container');
        chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        if (chat.style.display === 'flex') loadMsgs();
    }

    async function sendMsg() {
        const nev = document.getElementById('neved').value || "Sofőr";
        const input = document.getElementById('chat-msg');
        if (!input.value.trim()) return;
        await supabaseClient.from('messages').insert([{ sender_name: nev, message_text: input.value }]);
        input.value = "";
        loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
        if (data) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = data.map(m => `<div class="msg"><b>${m.sender_name}</b>${m.message_text}</div>`).reverse().join('');
            container.scrollTop = container.scrollHeight;
        }
    }

    async function frissit() {
        const { data } = await supabaseClient.from('carriers').select('*').eq('is_online', true);
        Object.keys(markers).forEach(k => map.removeLayer(markers[k]));
        markers = {};
        if (data) {
            data.forEach(c => {
                markers[c.full_name] = L.marker([c.last_location_lat, c.last_location_lng])
                    .addTo(map)
                    .bindPopup(`<b>${c.full_name}</b><br>${c.vehicle_type}<br>📍 ${c.destination || 'Úton'}`);
            });
        }
        if (document.getElementById('chat-container').style.display === 'flex') loadMsgs();
    }

    async function tervezUtvonal(lat, lng, cel) {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cel)}`);
        const results = await res.json();
        if (results && results.length > 0) {
            if (routingControl) map.removeControl(routingControl);
            routingControl = L.Routing.control({
                waypoints: [L.latLng(lat, lng), L.latLng(results[0].lat, results[0].lon)],
                lineOptions: { styles: [{ color: '#f39c12', weight: 7, opacity: 0.8 }] },
                createMarker: () => null,
                addWaypoints: false
            }).on('routesfound', e => {
                const r = e.routes[0];
                const d = (r.summary.totalDistance / 1000).toFixed(1);
                const t = Math.round(r.summary.totalTime / 60);
                document.getElementById('trip-info').style.display = 'block';
                document.getElementById('trip-info').innerText = `🏁 ${cel}: ${d} km (${Math.floor(t/60)}ó ${t%60}p)`;
            }).addTo(map);
        }
    }

    function inditas() {
        const nev = document.getElementById('neved').value;
        const hova = document.getElementById('uticel').value;
        if (!nev) return alert("Név nélkül nem látszol!");
        if (watchId) navigator.geolocation.clearWatch(watchId);
        watchId = navigator.geolocation.watchPosition(async pos => {
            const { latitude: lat, longitude: lng } = pos.coords;
            await supabaseClient.from('carriers').upsert([{ 
                full_name: nev, vehicle_type: document.getElementById('auto').value,
                destination: hova, last_location_lat: lat, last_location_lng: lng, is_online: true 
            }], { onConflict: 'full_name' });
            if (hova) tervezUtvonal(lat, lng, hova);
            map.setView([lat, lng], 13);
            frissit();
        }, null, { enableHighAccuracy: true });
    }

    async function stop() {
        const nev = document.getElementById('neved').value;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (routingControl) map.removeControl(routingControl);
        document.getElementById('trip-info').style.display = 'none';
        await supabaseClient.from('carriers').update({ is_online: false }).eq('full_name', nev);
        frissit();
    }

    setInterval(frissit, 10000);
    loadMsgs();
</script>

</body>
</html>
