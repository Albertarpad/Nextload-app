<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextLoad - Élő Flotta & Útvonal</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .form-container {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 20px;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 280px; backdrop-filter: blur(10px);
            border: 1px solid #ddd;
        }
        
        h2 { margin: 0 0 15px 0; font-size: 1.2rem; text-align: center; color: #2c3e50; }
        input, select, button { 
            width: 100%; padding: 12px; margin: 8px 0; 
            border-radius: 8px; border: 1px solid #ccc; 
            box-sizing: border-box; font-size: 14px;
        }
        
        .btn-online { background-color: #f39c12; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-online:hover { background-color: #e67e22; }
        
        .btn-offline { background-color: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-offline:hover { background-color: #c0392b; }
        
        #statusz { text-align: center; font-size: 0.85rem; margin-top: 10px; font-weight: bold; color: #27ae60; }
        .custom-div-icon { background: none !important; border: none !important; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>NextLoad Tracking</h2>
    <input type="text" id="neved" placeholder="Sofőr neve">
    
    <select id="auto">
        <option value="🚛">Kamion 🚛</option>
        <option value="🚚">Furgon 🚚</option>
        <option value="🚗">Puttonyos 🚗</option>
    </select>
    
    <input type="text" id="uticel" placeholder="Úticél (pl. Budapest)">
    
    <button class="btn-online" onclick="csatlakozas()">ONLINE LESZEK</button>
    <button class="btn-offline" onclick="muszakVege()">MŰSZAK VÉGE</button>
    
    <p id="statusz"></p>
</div>

<div id="map"></div>

<script>
    // --- BEILLESZTETT SUPABASE ADATOK ---
    const SB_URL = "https://sqnwvposgbnhsfzdajib.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    var map = L.map('map').setView([47.1625, 19.5033], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    let figyeloid = null;

    async function betoltes() {
        const { data, error } = await supabaseClient
            .from('carriers')
            .select('*')
            .eq('is_online', true);

        if (error) {
            console.error("Hiba a letöltéskor:", error.message);
            return;
        }

        map.eachLayer((layer) => {
            if (layer instanceof L.Marker) map.removeLayer(layer);
        });

        data.forEach(c => {
            if (c.last_location_lat && c.last_location_lng) {
                const customIcon = L.divIcon({
                    html: `
                        <div style="
                            background-color: white; 
                            border: 3px solid #f39c12; 
                            border-radius: 50%; 
                            width: 42px; height: 42px; 
                            display: flex; align-items: center; justify-content: center; 
                            font-size: 22px; 
                            box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
                            ${c.vehicle_type}
                        </div>`,
                    className: 'custom-div-icon',
                    iconSize: [42, 42],
                    iconAnchor: [21, 21]
                });

               L.marker([c.last_location_lat, c.last_location_lng], { icon: customIcon })
.addTo(map)
.bindPopup(`
    <div style="text-align: center; font-family: sans-serif;">
        <b style="font-size: 16px;">${c.full_name}</b><br>
        <span style="color: #27ae60; font-weight: bold;">Aktív sofőr 🚛</span><br>
        <hr style="margin: 8px 0; border: 0.5px solid #eee;">
        <div style="background: #f9f9f9; padding: 5px; border-radius: 5px;">
            <b style="color: #2c3e50;">📍 Úticél:</b><br>
            <span style="color: #e67e22; font-weight: bold;">${c.destination || 'Nincs megadva'}</span>
        </div>
    </div>
`);
                `);
            }
        });
    }

    async function csatlakozas() {
        const nev = document.getElementById('neved').value;
        const auto = document.getElementById('auto').value;
        const hova = document.getElementById('uticel').value;

        if (!nev) return alert("Kérlek, add meg a nevedet!");

        document.getElementById('statusz').innerText = "📍 GPS keresése...";
        document.getElementById('statusz').style.color = "#f39c12";

        if (figyeloid) navigator.geolocation.clearWatch(figyeloid);

        figyeloid = navigator.geolocation.watchPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            const { error } = await supabaseClient.from('carriers').upsert([
                { 
                    full_name: nev, 
                    vehicle_type: auto, 
                    last_location_lat: lat, 
                    last_location_lng: lng, 
                    destination: hova,
                    is_online: true 
                }
            ], { onConflict: 'full_name' });

            if (error) {
                console.error("Adatbázis hiba:", error.message);
            } else {
                document.getElementById('statusz').innerText = "📡 ÉLŐ KÖVETÉS AKTÍV";
                document.getElementById('statusz').style.color = "#27ae60";
                betoltes(); 
            }
        }, (err) => {
            document.getElementById('statusz').innerText = "❌ GPS hiba: " + err.message;
            document.getElementById('statusz').style.color = "#e74c3c";
        }, { 
            enableHighAccuracy: true,
            maximumAge: 0 
        });
    }

    async function muszakVege() {
        const nev = document.getElementById('neved').value;
        if (!nev) return alert("Add meg a neved a kijelentkezéshez!");

        if (figyeloid) {
            navigator.geolocation.clearWatch(figyeloid);
            figyeloid = null;
        }

        const { error } = await supabaseClient
            .from('carriers')
            .update({ is_online: false })
            .eq('full_name', nev);

        if (!error) {
            document.getElementById('statusz').innerText = "🏠 MŰSZAK VÉGE - KIJELENTKEZVE";
            document.getElementById('statusz').style.color = "#7f8c8d";
            betoltes(); 
        }
    }

    setInterval(betoltes, 10000);
    betoltes();
</script>

</body>
</html>
