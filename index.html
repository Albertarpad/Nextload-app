<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextLoad - Hitelesített Menetrend</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #eee; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(44, 62, 80, 0.95);
            z-index: 9999; display: flex; align-items: center; justify-content: center; color: white;
        }
        .login-box { background: white; color: #333; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        .form-container {
            position: absolute; top: 10px; left: 10px; z-index: 2000;
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 240px; display: none; overflow-y: auto; max-height: 90vh;
        }
        
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        .btn-main { background: #2980b9; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-alt { background: none; border: none; color: #2980b9; text-decoration: underline; cursor: pointer; font-size: 12px; }
        
        .hidden { display: none; }
        .role-fields { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
        
        #speedometer { background: #27ae60; color: white; padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 20px; text-align: center; font-weight: bold; display: none; }
        #chat-wrapper { position: absolute; bottom: 15px; right: 15px; z-index: 3000; display: none; flex-direction: column; align-items: flex-end; }
        #chat-toggle { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 id="auth-title">Bejelentkezés</h2>
        
        <input type="email" id="auth-email" placeholder="E-mail cím">
        <input type="password" id="auth-password" placeholder="Jelszó">
        
        <div id="registration-extra" class="hidden">
            <select id="auth-role" onchange="toggleRoleFields()">
                <option value="driver">🚛 Fuvarozó (Sofőr)</option>
                <option value="client">💼 Megrendelő</option>
            </select>
            <input type="text" id="auth-company" placeholder="Cégnév">
            <div id="driver-only-fields">
                <input type="text" id="auth-license" placeholder="Engedélyszám">
            </div>
        </div>

        <button class="btn-main" id="auth-btn" onclick="handleAuth()">BELÉPÉS</button>
        <button class="btn-alt" id="switch-btn" onclick="switchAuthMode()">Nincs még fiókom? Regisztráció</button>
    </div>
</div>

<div id="driver-panel" class="form-container">
    <div id="speedometer">0 km/h</div>
    <h3 id="display-name" style="color:#2980b9;"></h3>
    <input type="text" id="uticel" placeholder="Hová? (Város)">
    <button class="btn-main" onclick="inditas()" style="background:#27ae60">NAVIGÁCIÓ INDÍTÁSA</button>
    <button onclick="supabaseClient.auth.signOut().then(()=>location.reload())">KIJELENTKEZÉS</button>
</div>

<div id="client-panel" class="form-container">
    <h3 id="display-client-name" style="color:#27ae60;"></h3>
    <input type="text" id="job-cargo" placeholder="Áru megnevezése">
    <button class="btn-main" style="background:#27ae60">FUVAR KERESÉS</button>
    <button onclick="supabaseClient.auth.signOut().then(()=>location.reload())">KIJELENTKEZÉS</button>
</div>

<div id="map"></div>

<script>
    const SB_URL = "https://sqnwvposgbnhsfzdajib.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let isRegistration = false;
    let currentUser = null;
    var map = L.map('map', { zoomControl: false }).setView([47.16, 19.50], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function switchAuthMode() {
        isRegistration = !isRegistration;
        document.getElementById('auth-title').innerText = isRegistration ? 'Regisztráció' : 'Bejelentkezés';
        document.getElementById('auth-btn').innerText = isRegistration ? 'REGISZTRÁCIÓ' : 'BELÉPÉS';
        document.getElementById('switch-btn').innerText = isRegistration ? 'Már van fiókom? Belépés' : 'Nincs még fiókom? Regisztráció';
        document.getElementById('registration-extra').classList.toggle('hidden', !isRegistration);
    }

    function toggleRoleFields() {
        const role = document.getElementById('auth-role').value;
        document.getElementById('driver-only-fields').classList.toggle('hidden', role !== 'driver');
    }

    async function handleAuth() {
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        
        if (isRegistration) {
            const role = document.getElementById('auth-role').value;
            const company = document.getElementById('auth-company').value;
            const license = document.getElementById('auth-license').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email, password,
                options: { data: { role, company, license } }
            });
            if (error) alert("Hiba: " + error.message);
            else alert("Sikeres regisztráció! Jelentkezz be.");
        } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Hiba: " + error.message);
            else setupUI(data.user);
        }
    }

    function setupUI(user) {
        currentUser = user;
        document.getElementById('login-overlay').style.display = 'none';
        const role = user.user_metadata.role;
        const name = user.user_metadata.company || user.email;

        if (role === 'driver') {
            document.getElementById('driver-panel').style.display = 'block';
            document.getElementById('display-name').innerText = "Sofőr: " + name;
        } else {
            document.getElementById('client-panel').style.display = 'block';
            document.getElementById('display-client-name').innerText = "Ügyfél: " + name;
        }
    }

    // Automatikus belépés ellenőrzése betöltéskor
    supabaseClient.auth.getUser().then(({data}) => {
        if (data.user) setupUI(data.user);
    });
</script>
</body>
</html>
