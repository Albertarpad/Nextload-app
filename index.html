<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextLoad - Stabil Flotta</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; z-index: 1; }
        
        .form-container {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); width: 250px;
        }
        
        input, select, button { 
            width: 100%; padding: 10px; margin: 5px 0; 
            border-radius: 6px; border: 1px solid #ccc; 
            box-sizing: border-box; font-size: 14px;
        }
        
        .btn-on { background-color: #f39c12; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-off { background-color: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        #statusz { text-align: center; font-size: 0.8rem; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h3 style="margin-top:0; text-align:center;">NextLoad</h3>
    <input type="text" id="neved" placeholder="Sofőr neve">
    
    <select id="auto">
        <option value="🚛">Kamion 🚛</option>
        <option value="🚚">Furgon 🚚</option>
        <option value="🚗">Puttonyos 🚗</option>
    </select>
    
    <input type="text" id="uticel" placeholder="Úticél">
    
    <button class="btn-on" onclick="inditas()">ONLINE LESZEK</button>
    <button class="btn-off" onclick="stop()" style="margin-top:5px;">MŰSZAK VÉGE</button>
    
    <div id="statusz">Készen áll</div>
</div>

<div id="map"></div>

<script>
    // --- SUPABASE KAPCSOLAT ---
    const SB_URL = "https://sqnwvposgbnhsfzdajib.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // Térkép inicializálása
    var map = L.map('map').setView([47.16, 19.50], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let watchId = null;

    // Térkép frissítése (Kék ikonokkal a biztos láthatóságért)
    async function frissit() {
        const { data, error } = await supabaseClient
            .from('carriers')
            .select('*')
            .eq('is_online', true);

        if (error) return;

        // Régi markerek törlése
        map.eachLayer((layer) => {
            if (layer instanceof L.Marker) map.removeLayer(layer);
        });

        if (data) {
            data.forEach(c => {
                if (c.last_location_lat && c.last_location_lng) {
                    L.marker([c.last_location_lat, c.last_location_lng])
                    .addTo(map)
                    .bindPopup(`<b>${c.full_name}</b><br>Jármű: ${c.vehicle_type || '🚛'}<br>📍 Úticél: ${c.destination || 'Úton'}`);
                }
            });
        }
    }

    function inditas() {
        const nev = document.getElementById('neved').value;
        if (!nev) return alert("Név megadása kötelező!");

        document.getElementById('statusz').innerText = "📍 GPS keresése...";
        document.getElementById('statusz').style.color = "#f39c12";

        if (watchId) navigator.geolocation.clearWatch(watchId);

        watchId = navigator.geolocation.watchPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // Mentés az adatbázisba
            await supabaseClient.from('carriers').upsert([{ 
                full_name: nev, 
                vehicle_type: document.getElementById('auto').value,
                destination: document.getElementById('uticel').value,
                last_location_lat: lat, 
                last_location_lng: lng, 
                is_online: true 
            }], { onConflict: 'full_name' });

            // Fókuszálás a pozícióra
            map.setView([lat, lng], 13);

            document.getElementById('statusz').innerText = "📡 KÖVETÉS AKTÍV";
            document.getElementById('statusz').style.color = "#27ae60";
            
            frissit(); 
        }, (err) => {
            document.getElementById('statusz').innerText = "Hiba: " + err.message;
            document.getElementById('statusz').style.color = "#e74c3c";
        }, { 
            enableHighAccuracy: false, 
            timeout: 10000 
        });
    }

    async function stop() {
        const nev = document.getElementById('neved').value;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        
        await supabaseClient
            .from('carriers')
            .update({ is_online: false })
            .eq('full_name', nev);

        document.getElementById('statusz').innerText = "KIJELENTKEZVE";
        document.getElementById('statusz').style.color = "#7f8c8d";
        frissit();
    }

    // Frissítés 10 másodpercenként
    setInterval(frissit, 10000);
    frissit();
</script>

</body>
</html>
