<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NextLoad - Logisztikai Központ</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; background: #eee; }
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Belépő panel */
        #login-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(44, 62, 80, 0.95);
            z-index: 9999; display: flex; align-items: center; justify-content: center; color: white;
        }
        .login-box { background: white; color: #333; padding: 25px; border-radius: 15px; width: 85%; max-width: 320px; text-align: center; }

        /* Kezelőpanelek */
        .form-container {
            position: absolute; top: 10px; left: 10px; z-index: 2000;
            background: rgba(255, 255, 255, 0.95); padding: 10px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 250px;
            display: none; transition: all 0.3s ease;
        }
        
        /* Mobil optimalizált nézet */
        @media (max-width: 768px) {
            .form-container { width: 200px; padding: 8px; font-size: 12px; }
            input, select, button { padding: 8px; font-size: 12px; margin: 2px 0; }
            #speedometer { font-size: 18px; padding: 5px; }
        }

        .toggle-ui-btn { 
            background: #2c3e50; color: white; border: none; padding: 6px; 
            border-radius: 6px; font-size: 11px; cursor: pointer; margin-bottom: 5px; width: 100%;
            font-weight: bold;
        }

        #speedometer { background: #27ae60; color: white; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 22px; text-align: center; font-weight: bold; display: none; }
        #trip-info { background: #2c3e50; color: white; padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 12px; text-align: center; display: none; }

        input, select, button { width: 100%; padding: 10px; margin: 4px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .btn-main { background: #2980b9; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-on { background-color: #f39c12; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-off { background-color: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Chat */
        #chat-wrapper { position: absolute; bottom: 15px; right: 15px; z-index: 3000; display: none; flex-direction: column; align-items: flex-end; }
        #chat-toggle { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .new-msg-alert { background: #e74c3c !important; animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #chat-container { width: 300px; max-width: 80vw; height: 350px; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; flex-direction: column; overflow: hidden; border: 1px solid #ddd; margin-bottom: 10px; }
        #chat-header { background: #2c3e50; color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 14px; }
        #chat-messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 13px; background: #fdfdfd; display: flex; flex-direction: column; }
        
        .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 8px; background: #f0f0ff; border-left: 4px solid #27ae60; word-break: break-word; }
        .msg b { color: #2c3e50; font-size: 11px; display: block; margin-bottom: 2px; }
        .job-card { background: #fffbe6; border: 1px solid #ffe58f; padding: 8px; margin-top: 5px; border-radius: 6px; font-size: 11px; }

        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 style="margin-top:0">NextLoad Login</h2>
        <input type="text" id="user-name" placeholder="Név / Cégnév">
        <select id="user-role">
            <option value="driver">🚛 Sofőr vagyok</option>
            <option value="client">💼 Megrendelő vagyok</option>
        </select>
        <button class="btn-main" onclick="login()">BELÉPÉS</button>
    </div>
</div>

<div id="driver-panel" class="form-container">
    <button class="toggle-ui-btn" onclick="toggleUI('driver-content')">MENÜ ELREJTÉSE / MUTATÁSA</button>
    <div id="driver-content">
        <div id="speedometer">0 km/h</div>
        <div id="trip-info">Számítás...</div>
        <h3 id="display-name" style="margin:5px 0; color:#2980b9; font-size: 16px;"></h3>
        <select id="auto">
            <option value="🚛">Kamion</option>
            <option value="🚚">Furgon</option>
            <option value="🚗">Puttonyos</option>
        </select>
        <input type="text" id="uticel" placeholder="Úticél (Város)">
        <button class="btn-on" onclick="inditas()">ONLINE LESZEK</button>
        <button class="btn-off" onclick="stop()" style="margin-top:2px;">MŰSZAK VÉGE</button>
        <div id="active-jobs-list" style="max-height: 120px; overflow-y:auto; margin-top:10px; border-top: 1px dashed #ccc; padding-top: 5px;">
            <small><b>Várható fuvarok:</b></small>
        </div>
    </div>
</div>

<div id="client-panel" class="form-container">
    <button class="toggle-ui-btn" onclick="toggleUI('client-content')">MENÜ ELREJTÉSE / MUTATÁSA</button>
    <div id="client-content">
        <h3 id="display-client-name" style="margin:5px 0; color:#27ae60; font-size: 16px;"></h3>
        <input type="text" id="job-cargo" placeholder="Mit kell vinni?">
        <input type="text" id="job-pickup" placeholder="Honnan?">
        <input type="text" id="job-dropoff" placeholder="Hová?">
        <input type="text" id="job-price" placeholder="Fuvardíj ajánlat">
        <button class="btn-main" style="background:#27ae60" onclick="postJob()">MEGBÍZÁS FELADÁSA</button>
    </div>
</div>

<div id="chat-wrapper">
    <div id="chat-container">
        <div id="chat-header" onclick="toggleChat()">CB Rádió / Tőzsde</div>
        <div id="chat-messages"></div>
        <div style="display:flex; padding:8px; background:white; border-top:1px solid #eee;">
            <input type="text" id="chat-msg" placeholder="Üzenet..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="width:70px; background:#27ae60; color:white; border:none; border-radius:6px; margin-left:5px;">KÜLD</button>
        </div>
    </div>
    <button id="chat-toggle" onclick="toggleChat()">💬 Chat / CB</button>
</div>

<div id="map"></div>

<script>
    const SB_URL = "https://sqnwvposgbnhsfzdajib.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let currentUser = { name: "", role: "" };
    var map = L.map('map', { zoomControl: false }).setView([47.16, 19.50], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);

    let watchId = null, routingControl = null, markers = {}, lastMsgCount = 0, chatOpen = false;

    function toggleUI(id) {
        const content = document.getElementById(id);
        content.style.display = (content.style.display === 'none') ? 'block' : 'none';
    }

    function login() {
        const name = document.getElementById('user-name').value;
        const role = document.getElementById('user-role').value;
        if (!name) return alert("Kérlek add meg a neved!");
        currentUser = { name, role };
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('chat-wrapper').style.display = 'flex';
        if (role === 'driver') {
            document.getElementById('driver-panel').style.display = 'block';
            document.getElementById('display-name').innerText = name;
        } else {
            document.getElementById('client-panel').style.display = 'block';
            document.getElementById('display-client-name').innerText = name;
        }
        frissit();
    }

    async function postJob() {
        const cargo = document.getElementById('job-cargo').value;
        const pickup = document.getElementById('job-pickup').value;
        const dropoff = document.getElementById('job-dropoff').value;
        const price = document.getElementById('job-price').value;
        if(!cargo || !pickup || !dropoff) return alert("Hiányzó adatok!");
        await supabaseClient.from('jobs').insert([{ client_name: currentUser.name, cargo_type: cargo, pickup_city: pickup, dropoff_city: dropoff, price: price }]);
        alert("Megbízás feladva!");
        await supabaseClient.from('messages').insert([{ sender_name: "TŐZSDE", message_text: `📢 ${pickup} -> ${dropoff} | ${cargo} | ${price}` }]);
        loadJobs();
    }

    async function loadJobs() {
        const { data } = await supabaseClient.from('jobs').select('*').order('created_at', { ascending: false }).limit(5);
        if (data && currentUser.role === 'driver') {
            const list = document.getElementById('active-jobs-list');
            list.innerHTML = '<small><b>Várható fuvarok:</b></small>' + data.map(j => `
                <div class="job-card">
                    <b>${j.pickup_city} ➡ ${j.dropoff_city}</b><br>
                    ${j.cargo_type} | ${j.price}
                </div>
            `).join('');
        }
    }

    function toggleChat() {
        const chat = document.getElementById('chat-container');
        const btn = document.getElementById('chat-toggle');
        chatOpen = chat.style.display !== 'flex';
        chat.style.display = chatOpen ? 'flex' : 'none';
        if (chatOpen) {
            btn.classList.remove('new-msg-alert');
            btn.innerText = "💬 Chat / CB";
            loadMsgs();
        }
    }

    async function sendMsg() {
        const input = document.getElementById('chat-msg');
        if (!input.value.trim()) return;
        await supabaseClient.from('messages').insert([{ sender_name: currentUser.name, message_text: input.value }]);
        input.value = ""; loadMsgs();
    }

    async function loadMsgs() {
        const { data } = await supabaseClient.from('messages').select('*').order('created_at', { ascending: false }).limit(20);
        if (data) {
            const container = document.getElementById('chat-messages');
            container.innerHTML = data.map(m => `<div class="msg"><b>${m.sender_name}</b>${m.message_text}</div>`).reverse().join('');
            container.scrollTop = container.scrollHeight;
            if (!chatOpen && lastMsgCount !== 0 && data.length > lastMsgCount) {
                document.getElementById('chat-toggle').classList.add('new-msg-alert');
                document.getElementById('chat-toggle').innerText = "💬 ÚJ ÜZENET!";
            }
            lastMsgCount = data.length;
        }
    }

    async function frissit() {
        const { data } = await supabaseClient.from('carriers').select('*').eq('is_online', true);
        Object.keys(markers).forEach(k => map.removeLayer(markers[k]));
        markers = {};
        if (data) {
            data.forEach(c => {
                markers[c.full_name] = L.marker([c.last_location_lat, c.last_location_lng]).addTo(map)
                    .bindPopup(`<b>${c.full_name}</b><br>${c.vehicle_type}<br>💨 ${c.speed} km/h<br>📍 Cél: ${c.destination || '-'}`);
            });
        }
        loadMsgs(); loadJobs();
    }

    async function tervezUtvonal(lat, lng, cel) {
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cel)}`);
            const results = await res.json();
            if (results && results.length > 0) {
                if (routingControl) map.removeControl(routingControl);
                routingControl = L.Routing.control({
                    waypoints: [L.latLng(lat, lng), L.latLng(results[0].lat, results[0].lon)],
                    lineOptions: { styles: [{ color: '#3498db', weight: 6, opacity: 0.8 }] },
                    createMarker: () => null, addWaypoints: false
                }).on('routesfound', e => {
                    const r = e.routes[0];
                    document.getElementById('trip-info').style.display = 'block';
                    document.getElementById('trip-info').innerText = `🏁 ${cel}: ${(r.summary.totalDistance/1000).toFixed(1)} km`;
                }).addTo(map);
            }
        } catch(e) {}
    }

    function inditas() {
        const hova = document.getElementById('uticel').value;
        document.getElementById('speedometer').style.display = 'block';
        watchId = navigator.geolocation.watchPosition(async pos => {
            const { latitude: lat, longitude: lng, speed } = pos.coords;
            const kmh = speed ? Math.round(speed * 3.6) : 0;
            document.getElementById('speedometer').innerText = kmh + " km/h";
            await supabaseClient.from('carriers').upsert([{ 
                full_name: currentUser.name, vehicle_type: document.getElementById('auto').value,
                destination: hova, last_location_lat: lat, last_location_lng: lng, speed: kmh, is_online: true 
            }], { onConflict: 'full_name' });
            if (hova) tervezUtvonal(lat, lng, hova);
            map.setView([lat, lng], 13);
            frissit();
        }, null, { enableHighAccuracy: true });
    }

    async function stop() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        document.getElementById('speedometer').style.display = 'none';
        document.getElementById('trip-info').style.display = 'none';
        if (routingControl) map.removeControl(routingControl);
        await supabaseClient.from('carriers').update({ is_online: false, speed: 0 }).eq('full_name', currentUser.name);
        frissit();
    }

    setInterval(frissit, 10000);
</script>
</body>
</html>
