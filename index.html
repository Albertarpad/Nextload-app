<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextLoad - Útvonaltervező</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #eee; }
        
        .form-container {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 260px; border: 1px solid #ddd;
        }
        
        h3 { margin: 0 0 10px 0; text-align: center; color: #2c3e50; }
        input, select, button { 
            width: 100%; padding: 10px; margin: 5px 0; 
            border-radius: 6px; border: 1px solid #ccc; 
            box-sizing: border-box; font-size: 14px;
        }
        
        .btn-on { background-color: #f39c12; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-off { background-color: #e74c3c; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        #statusz { text-align: center; font-size: 11px; margin-top: 8px; font-weight: bold; color: #7f8c8d; }
        
        /* Útvonaltervező táblázat elrejtése (ne takarja a térképet) */
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

<div class="form-container">
    <h3>NextLoad Tracking</h3>
    <input type="text" id="neved" placeholder="Sofőr neve">
    
    <select id="auto">
        <option value="🚛">Kamion 🚛</option>
        <option value="🚚">Furgon 🚚</option>
        <option value="🚗">Puttonyos 🚗</option>
    </select>
    
    <input type="text" id="uticel" placeholder="Úticél (pl. Budapest)">
    
    <button class="btn-on" onclick="inditas()">ONLINE LESZEK</button>
    <button class="btn-off" onclick="stop()">MŰSZAK VÉGE</button>
    
    <div id="statusz">Készen áll az indulásra! 🗺️</div>
</div>

<div id="map"></div>

<script>
    const SB_URL = "https://sqnwvposgbnhsfzdajib.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    var map = L.map('map').setView([47.16, 19.50], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let watchId = null;
    let routingControl = null;

    // Térkép frissítése és útvonal rajzolása
    async function frissit() {
        const { data, error } = await supabaseClient
            .from('carriers')
            .select('*')
            .eq('is_online', true);

        if (error) return;

        // Markerek törlése (kivéve az útvonalvonalat)
        map.eachLayer((layer) => {
            if (layer instanceof L.Marker) map.removeLayer(layer);
        });

        if (data) {
            data.forEach(c => {
                if (c.last_location_lat && c.last_location_lng) {
                    const marker = L.marker([c.last_location_lat, c.last_location_lng])
                    .addTo(map)
                    .bindPopup(`<b>${c.full_name}</b><br>${c.vehicle_type || '🚛'}<br>📍 Cél: ${c.destination || 'Úton'}`);
                    
                    // Ha az adott sofőr épp beírta az úticélt, és ő a felhasználó
                    const sajatNev = document.getElementById('neved').value;
                    if (c.full_name === sajatNev && c.destination) {
                        tervezUtvonal(c.last_location_lat, c.last_location_lng, c.destination);
                    }
                }
            });
        }
    }

    // Útvonaltervezés koordináta és városnév alapján
    async function tervezUtvonal(lat, lng, celvaros) {
        if (routingControl) map.removeControl(routingControl);

        // Városnév keresése koordinátákká (Geocoding)
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${celvaros}`);
            const results = await response.json();

            if (results.length > 0) {
                const celLat = results[0].lat;
                const celLng = results[0].lon;

                routingControl = L.Routing.control({
                    waypoints: [
                        L.latLng(lat, lng),
                        L.latLng(celLat, celLng)
                    ],
                    lineOptions: { styles: [{ color: '#f39c12', weight: 5 }] },
                    createMarker: function() { return null; }, // Ne tegyen plusz markert a célhoz
                    addWaypoints: false,
                    routeWhileDragging: false
                }).addTo(map);
            }
        } catch (e) {
            console.log("Útvonaltervezési hiba: " + e.message);
        }
    }

    function inditas() {
        const nev = document.getElementById('neved').value;
        const hova = document.getElementById('uticel').value;
        if (!nev) return alert("Név kell!");

        document.getElementById('statusz').innerText = "📍 Pozíció keresése...";

        if (watchId) navigator.geolocation.clearWatch(watchId);

        watchId = navigator.geolocation.watchPosition(async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            await supabaseClient.from('carriers').upsert([{ 
                full_name: nev, 
                vehicle_type: document.getElementById('auto').value,
                destination: hova, 
                last_location_lat: lat, 
                last_location_lng: lng, 
                is_online: true 
            }], { onConflict: 'full_name' });

            map.setView([lat, lng], 13);
            document.getElementById('statusz').innerText = "📡 ÉLŐ: " + nev;
            frissit(); 
        }, (err) => {
            document.getElementById('statusz').innerText = "GPS Hiba: " + err.message;
        }, { 
            enableHighAccuracy: false, 
            timeout: 10000 
        });
    }

    async function stop() {
        const nev = document.getElementById('neved').value;
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (routingControl) map.removeControl(routingControl);
        
        await supabaseClient.from('carriers').update({ is_online: false }).eq('full_name', nev);
        document.getElementById('statusz').innerText = "KIKAPCSOLVA";
        frissit();
    }

    setInterval(frissit, 15000); // 15 mp-re növeltem a kímélés miatt
    frissit();
</script>

</body>
</html>
