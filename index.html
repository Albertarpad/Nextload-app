<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextLoad - Térkép</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        .header { background: #0052FF; color: white; padding: 15px; text-align: center; }
        #map { height: 400px; width: 100%; border-bottom: 5px solid #00F5A0; }
        .form-container { padding: 20px; max-width: 400px; margin: auto; background: white; border-radius: 0 0 15px 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00F5A0; border: none; border-radius: 8px; color: #0052FF; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h1>NextLoad Live</h1></div>
<div id="map"></div> <div class="form-container">
    <input type="text" id="neved" placeholder="Fuvarozó neve">
    <select id="auto">
        <option value="furgon">Furgon</option>
        <option value="kamion">Kamion</option>
    </select>
    <button onclick="csatlakozas()">Aktiválás és Pozíció küldése</button>
    <p id="statusz" style="text-align:center; font-weight:bold;"></p>
</div>

<script>
    const SB_URL = 'https://sqnwvposgbnhsfzdajib.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxbnd2cG9zZ2JuaHNmemRhamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzOTI3MTAsImV4cCI6MjA4Nzk2ODcxMH0.68q2MexdPzl_u_9LmbvUHG51xW1S6ph4y4q3RXK798I'; // <--- EZT PÓTOLD!
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // Térkép inicializálása (Alapból Budapestet mutatja)
    var map = L.map('map').setView([47.4979, 19.0402], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var marker;

    // GPS pozíció lekérése
    navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        map.setView([lat, lng], 15);
        marker = L.marker([lat, lng]).addTo(map).bindPopup("Te itt vagy!").openPopup();
    });

    async function csatlakozas() {
        const nev = document.getElementById('neved').value;
        const jarmu = document.getElementById('auto').value;
        const kiiras = document.getElementById('statusz');

        navigator.geolocation.getCurrentPosition(async function(pos) {
            const { error } = await supabaseClient
                .from('carriers')
                .insert([{ 
                    full_name: nev, 
                    vehicle_type: jarmu,
                    last_location_lat: pos.coords.latitude,
                    last_location_lng: pos.coords.longitude,
                    is_online: true
                }]);

            if (error) {
                kiiras.innerText = "Hiba: " + error.message;
            } else {
                kiiras.innerText = "Sikeresen online vagy a térképen!";
                kiiras.style.color = "green";
            }
        });
    }
</script>
</body>
</html>
